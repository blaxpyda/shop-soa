syntax = "proto3";

package grocery.business;
option go_package = "github.com/blaxpyda/grocery/proto/business";

// ==========================================
// SERVICE DEFINITION
// ==========================================

service BusinessService {
  rpc CreateBusiness(CreateBusinessRequest) returns (Business);
  rpc GetBusiness(GetBusinessRequest)       returns (Business);
  rpc UpdateBusiness(UpdateBusinessRequest) returns (Business);
  rpc DeleteBusiness(DeleteBusinessRequest) returns (DeleteBusinessResponse);
}

// ==========================================
// BUSINESS MESSAGE
// ==========================================

message Business {
  string id          = 1;
  string owner_id    = 2;
  string name        = 3;
  string description = 4;
  string email       = 5;
  string phone       = 6;
  string address     = 7;
  string city        = 8;
  string country     = 9;
  bool   is_active   = 10;
  string created_at  = 11;
  string updated_at  = 12;
}

// ==========================================
// REQUEST / RESPONSE MESSAGES
// ==========================================

message CreateBusinessRequest {
  string name        = 1;
  string description = 2;
  string email       = 3;
  string phone       = 4;
  string address     = 5;
  string city        = 6;
  string country     = 7;
}

message GetBusinessRequest {
  string business_id = 1;
}

message UpdateBusinessRequest {
  string business_id = 1;
  string name        = 2;
  string description = 3;
  string email       = 4;
  string phone       = 5;
  string address     = 6;
  string city        = 7;
  string country     = 8;
  bool   is_active   = 9;
}

message DeleteBusinessRequest {
  string business_id = 1;
}

message DeleteBusinessResponse {
  bool success = 1;
}
