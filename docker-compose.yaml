services:

  # ── Services ──────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    environment:
      AUTH_SQLITE_PATH: /app/data/auth.db
      AUTH_GRPC_PORT: 50052
      AUTH_JWT_PRIVATE_KEY_PATH: /app/secrets/jwt_private.pem
      AUTH_JWT_PUBLIC_KEY_PATH: /app/secrets/jwt_public.pem
      AUTH_GMAIL_USERNAME: ${AUTH_GMAIL_USERNAME}
      AUTH_GMAIL_PASSWORD: ${AUTH_GMAIL_PASSWORD}
      AUTH_EASYSEND_SMS_API_KEY: ${AUTH_EASYSEND_SMS_API_KEY}
      AUTH_EASYSEND_SMS_SENDER_ID: ${AUTH_EASYSEND_SMS_SENDER_ID}
      AUTH_SUPER_ADMIN_EMAIL: ${AUTH_SUPER_ADMIN_EMAIL}
      AUTH_SUPER_ADMIN_PASSWORD: ${AUTH_SUPER_ADMIN_PASSWORD}
    volumes:
      - ./secrets:/app/secrets:ro
      - auth_data:/app/data
    networks:
      - grocery_network

  business-service:
    build:
      context: ./business
      dockerfile: Dockerfile
    environment:
      BUSINESS_SQLITE_PATH: /app/data/business.db
      BUSINESS_GRPC_PORT: 50053
      BUSINESS_JWT_PUBLIC_KEY_PATH: /app/secrets/jwt_public.pem
    volumes:
      - ./secrets:/app/secrets:ro
      - business_data:/app/data
    networks:
      - grocery_network

  catalog-service:
    build:
      context: ./catalog
      dockerfile: Dockerfile
    environment:
      CATALOG_SQLITE_PATH: /app/data/catalog.db
      CATALOG_GRPC_PORT: 50053
      CATALOG_JWT_PUBLIC_KEY_PATH: /app/secrets/jwt_public.pem
    volumes:
      - ./secrets:/app/secrets:ro
      - catalog_data:/app/data
    networks:
      - grocery_network

  ordering-service:
    build:
      context: .
      dockerfile: ordering/Dockerfile
    environment:
      ORDERING_SQLITE_PATH: /app/data/ordering.db
      ORDERING_GRPC_PORT: 50054
      ORDERING_JWT_PUBLIC_KEY_PATH: /app/secrets/jwt_public.pem
      ORDERING_CATALOG_ADDRESS: catalog-service:50053
    volumes:
      - ./secrets:/app/secrets:ro
      - ordering_data:/app/data
    depends_on:
      - catalog-service
    networks:
      - grocery_network

  payment-service:
    build:
      context: ./payment
      dockerfile: Dockerfile
    environment:
      PAYMENT_SQLITE_PATH: /app/data/payment.db
      PAYMENT_GRPC_PORT: 50055
      PAYMENT_JWT_PUBLIC_KEY_PATH: /app/secrets/jwt_public.pem
    ports:
      - "8081:8081"  # mobile-money webhook endpoint
    volumes:
      - ./secrets:/app/secrets:ro
      - payment_data:/app/data
    networks:
      - grocery_network

  notifications-service:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    environment:
      NOTIFICATIONS_SQLITE_PATH: /app/data/notifications.db
      NOTIFICATIONS_GRPC_PORT: 50056
      NOTIFICATIONS_JWT_PUBLIC_KEY_PATH: /app/secrets/jwt_public.pem
    volumes:
      - ./secrets:/app/secrets:ro
      - notifications_data:/app/data
    networks:
      - grocery_network

  api-gateway:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      JWT_PUBLIC_KEY_PATH: /app/secrets/jwt_public.pem
      LISTEN_ADDR: :8080
      AUTH_ADDR: auth-service:50052
      BUSINESS_ADDR: business-service:50053
      CATALOG_ADDR: catalog-service:50053
      ORDERING_ADDR: ordering-service:50054
      PAYMENT_ADDR: payment-service:50055
      NOTIFICATIONS_ADDR: notifications-service:50056
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      - auth-service
      - business-service
      - catalog-service
      - ordering-service
      - payment-service
      - notifications-service
    networks:
      - grocery_network

volumes:
  auth_data:
  business_data:
  catalog_data:
  ordering_data:
  payment_data:
  notifications_data:

networks:
  grocery_network:
    driver: bridge
