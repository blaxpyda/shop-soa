syntax = "proto3";

package grocery.cart;
option go_package = "thugcorp.io/grocery/cart/proto";

service CartService {
  rpc GetCart(GetCartRequest) returns (Cart);
  rpc AddToCart(AddToCartRequest) returns (Cart);
  rpc RemoveFromCart(RemoveFromCartRequest) returns (Cart);
  rpc ClearCart(ClearCartRequest) returns (EmptyResponse);
}

message Cart {
  string cart_id = 1;
  string user_id = 2;
  string business_id = 3;           // Important: which store
  repeated CartItem items = 4;
  double total_amount = 5;
  int32 item_count = 6;
}

message CartItem {
  string product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  double price = 4;                 // price at time of adding
}

message AddToCartRequest {
  string user_id = 1;
  string business_id = 2;
  string product_id = 3;
  int32 quantity = 4;
}

message RemoveFromCartRequest {
  string user_id = 1;
  string business_id = 2;
  string product_id = 3;
}

message GetCartRequest {
  string user_id = 1;
  string business_id = 2;
}

message ClearCartRequest {
  string user_id = 1;
  string business_id = 2;
}

message EmptyResponse {
  bool success = 1;
  string error = 2;
}