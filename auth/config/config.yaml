app:
  name: auth-service
  environment: development
  port: 8080
  log_level: debug

postgres:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: auth_db
  sslmode: disable

grpc:
  port: 50052

jwt:
  private_key_path: "../../secrets/jwt_private.pem"
  public_key_path: "../../secrets/jwt_public.pem"
  access_token_ttl: 3600