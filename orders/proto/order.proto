syntax = "proto3";

package grocery.order;
option go_package = "github.com/blaxpyda/grocery/proto/order";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (Order);           // Usually from Cart
  rpc GetOrder(GetOrderRequest) returns (Order);
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (Order);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc CancelOrder(CancelOrderRequest) returns (Order);
}

message Order {
  string id = 1;
  string user_id = 2;
  string business_id = 3;
  repeated OrderItem items = 4;
  double total_amount = 5;
  string status = 6;                    // pending, confirmed, processing, shipped, delivered, cancelled
  string shipping_address = 7;
  string payment_method = 8;
 
}

message OrderItem {
  string product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  double price = 4;
}

message CreateOrderRequest {
  string user_id = 1;
  string business_id = 2;
  string shipping_address = 3;
  string payment_method = 4;
}

message GetOrderRequest {
  string order_id = 1;
}

message UpdateOrderStatusRequest {
  string order_id = 1;
  string status = 2;
}

message ListOrdersRequest {
  string user_id = 1;
  string business_id = 2;
  string status = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int32 total = 2;
}

message CancelOrderRequest {
  string order_id = 1;
  string reason = 2;
}